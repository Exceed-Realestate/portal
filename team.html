<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Members — Exceed Real Estate</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="liquid.css">
  <style>
    :root {
      --navy-0: #051428;
      --navy-1: #0a1f3d;
      --navy-2: #102a4f;
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(255,255,255,0.18);
      --text: #f5f7fb;
      --muted: #9aa8c2;
      --gold: #d4b87a;
      --cream: #f1ead8;
      --green: #5cc98f;
      --wa: #25d366;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { background: var(--navy-0); }
    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background:
        radial-gradient(900px 600px at 80% -10%, rgba(212,184,122,0.08), transparent 60%),
        radial-gradient(800px 600px at -10% 110%, rgba(23,54,99,0.6), transparent 60%),
        var(--navy-0);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--line); backdrop-filter: blur(8px); background: rgba(5,20,40,0.7); position: sticky; top: 0; z-index: 10; }
    .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .brand img { width: 40px; height: 40px; border-radius: 8px; }
    .brand-name { font-family: 'Playfair Display', serif; letter-spacing: 2px; font-weight: 600; }
    .brand-name span { color: var(--gold); font-weight: 400; }
    .topbar-right { display: flex; align-items: center; gap: 14px; color: var(--muted); font-size: 13px; }
    .topbar-right strong { color: var(--cream); font-weight: 600; }
    .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; transition: background .2s, border-color .2s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
    .icon-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--line-strong); }
    .icon-btn svg { width: 14px; height: 14px; }
    .lang-toggle { display: inline-flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid var(--line); border-radius: 999px; padding: 4px; position: relative; }
    .lang-toggle button { background: transparent; border: none; color: var(--muted); font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 1px; padding: 6px 12px; border-radius: 999px; cursor: pointer; transition: color .25s; position: relative; z-index: 1; }
    .lang-toggle button.active { color: var(--navy-0); }
    .lang-toggle .pill { position: absolute; top: 4px; bottom: 4px; background: var(--cream); border-radius: 999px; transition: transform .35s cubic-bezier(.34,1.56,.64,1), width .35s ease; z-index: 0; }

    .page-head { max-width: 1280px; margin: 0 auto; padding: 40px 32px 0; }
    .page-head .eyebrow { color: var(--gold); letter-spacing: 5px; font-size: 11px; text-transform: uppercase; margin-bottom: 10px; }
    .page-head h1 { font-family: 'Noto Serif JP', 'Playfair Display', serif; font-weight: 500; font-size: clamp(28px, 4vw, 40px); margin: 0 0 8px; }
    .page-head .lede { color: var(--muted); font-size: 14px; max-width: 720px; margin: 0; line-height: 1.6; }

    /* Sub-tab nav — horizontal scrollable for many tabs */
    .subtabs-wrap { max-width: 1280px; margin: 30px auto 0; padding: 0 32px; border-bottom: 1px solid var(--line); }
    .subtabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: thin; -webkit-overflow-scrolling: touch; }
    .subtabs::-webkit-scrollbar { height: 4px; }
    .subtabs::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
    .subtab {
      background: transparent; border: none; color: var(--muted);
      font-family: inherit; font-size: 13px; font-weight: 500;
      padding: 14px 16px; cursor: pointer; position: relative;
      transition: color .2s; white-space: nowrap; letter-spacing: 0.3px;
      flex: none;
    }
    .subtab:hover { color: var(--cream); }
    .subtab.active { color: var(--gold); }
    .subtab.active::after { content: ''; position: absolute; bottom: -1px; left: 8px; right: 8px; height: 2px; background: var(--gold); border-radius: 2px; }
    .subtab .count { display: inline-block; margin-left: 6px; padding: 1px 7px; background: rgba(255,255,255,0.05); border: 1px solid var(--line); border-radius: 999px; font-size: 10px; color: var(--muted); }
    .subtab.active .count { background: rgba(212,184,122,0.15); border-color: rgba(212,184,122,0.4); color: var(--gold); }

    .panel { display: none; max-width: 1280px; margin: 0 auto; padding: 30px 32px 80px; }
    .panel.active { display: block; }

    .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; gap: 12px; flex-wrap: wrap; }
    .section-head h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; margin: 0; color: var(--cream); }
    .section-head .sub { color: var(--muted); font-size: 13px; }

    .grid {
      display: grid; gap: 18px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }

    .member-card {
      background: linear-gradient(180deg, rgba(16,42,79,0.85), rgba(10,31,61,0.85));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px 22px 18px;
      transition: transform .25s, border-color .25s, box-shadow .25s;
      position: relative;
      overflow: hidden;
    }
    .member-card:hover { transform: translateY(-3px); border-color: rgba(212,184,122,0.4); box-shadow: 0 18px 40px -16px rgba(0,0,0,.55); }

    .avatar-wrap {
      width: 96px; height: 96px;
      border-radius: 50%;
      margin: 0 auto 14px;
      position: relative;
      background: linear-gradient(135deg, var(--gold), #8a6a30);
      padding: 2px;
    }
    .avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(212,184,122,0.25), rgba(23,54,99,0.6));
      display: grid; place-items: center;
      color: var(--cream);
      font-family: 'Playfair Display', serif;
      font-size: 32px; font-weight: 600;
      letter-spacing: 1px;
      overflow: hidden;
      position: relative;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar img[src$="placeholder"] { display: none; }

    .member-name {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 600;
      letter-spacing: 0.3px;
      margin: 0 0 2px;
      color: var(--cream);
    }
    .member-name-ja {
      text-align: center;
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 10px;
    }
    .member-role {
      text-align: center;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 14px;
    }
    .member-meta {
      display: flex; flex-direction: column; gap: 6px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .member-meta-row { display: flex; align-items: center; gap: 8px; }
    .member-meta-row svg { width: 13px; height: 13px; flex: none; opacity: .8; }
    .member-meta-row a { color: var(--cream); text-decoration: none; word-break: break-all; }
    .member-meta-row a:hover { color: var(--gold); }
    .tz-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px; background: rgba(212,184,122,0.1);
      border: 1px solid rgba(212,184,122,0.3);
      color: var(--gold); border-radius: 999px;
      font-size: 10px; letter-spacing: 0.5px; font-family: ui-monospace, 'SF Mono', monospace;
    }

    .actions { display: flex; gap: 8px; margin-top: 14px; }
    .action {
      flex: 1;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 12px; border-radius: 8px; font-size: 12px;
      letter-spacing: 0.5px; font-weight: 600; cursor: pointer;
      text-decoration: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      transition: all .15s;
    }
    .action:hover { background: rgba(255,255,255,0.1); border-color: var(--line-strong); }
    .action svg { width: 14px; height: 14px; }
    .action.wa { background: rgba(37,211,102,0.12); border-color: rgba(37,211,102,0.4); color: #5ee896; }
    .action.wa:hover { background: rgba(37,211,102,0.22); border-color: var(--wa); color: #fff; }
    .action.tel { background: rgba(122,167,255,0.10); border-color: rgba(122,167,255,0.35); color: #a8c8ff; }
    .action.tel:hover { background: rgba(122,167,255,0.20); color: #fff; }
    .action.mail { background: rgba(212,184,122,0.10); border-color: rgba(212,184,122,0.35); color: var(--gold); }
    .action.mail:hover { background: rgba(212,184,122,0.20); color: #fff; }

    .empty {
      text-align: center;
      padding: 60px 24px;
      border: 1px dashed var(--line-strong);
      border-radius: 12px;
      color: var(--muted);
    }
    .empty-title { color: var(--cream); font-size: 16px; font-weight: 600; margin: 0 0 8px; }
    .empty p { font-size: 13px; margin: 0; line-height: 1.55; }

    /* Quick add hint — for admin to know how to add members later */
    .add-hint {
      margin-top: 36px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed var(--line-strong);
      border-radius: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    .add-hint strong { color: var(--cream); }
    .add-hint code { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; font-family: ui-monospace, 'SF Mono', monospace; font-size: 11px; color: var(--cream); }

    @media (max-width: 700px) {
      .topbar { padding: 14px 18px; flex-wrap: wrap; gap: 12px; }
      .page-head, .subtabs-wrap, .panel { padding-left: 18px; padding-right: 18px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand" onclick="window.location.href='agent.html'">
      <img src="logo.jpg" alt="Exceed" />
      <div class="brand-name">EXCEED <span>REAL ESTATE</span></div>
    </div>
    <div class="topbar-right">
      <a class="icon-btn" href="agent.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span data-i18n="back">ダッシュボード</span>
      </a>
      <span><span data-i18n="hello">こんにちは、</span><strong id="userName">—</strong></span>
      <div class="lang-toggle" id="langToggle">
        <span class="pill" id="langPill"></span>
        <button data-lang="ja" class="active">日本語</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <div class="page-head">
    <div class="eyebrow" data-i18n="eyebrow">Team Members</div>
    <h1 data-i18n="title">チームメンバー一覧</h1>

  </div>

  <div class="subtabs-wrap">
    <nav class="subtabs" id="subtabs"></nav>
  </div>

  <main id="panels"></main>

  <script type="module">
    import { auth, db } from './firebase-init.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    // ============ TEAM DATA ============
    // Add members here. Drop photos into the team/ folder using the filename in `photo`.
    // tz uses IANA strings: Asia/Tokyo, Asia/Dubai, Asia/Jakarta, Asia/Hong_Kong, etc.
    // phone: keep international format with + and digits only (used for tel: and wa.me/ links).
    const SECTIONS = [
      { id: 'ceo',                ja: '代表取締役 CEO',         en: 'CEO' },
      { id: 'md',                 ja: 'マネージング・ディレクター', en: 'Managing Director' },
      { id: 'coo',                ja: '最高執行責任者 COO',      en: 'COO' },
      { id: 'board',              ja: '取締役会',              en: 'Board Members' },
      { id: 'dubai-sales',        ja: 'ドバイ営業チーム',         en: 'Dubai Sales Team' },

    const TEAM = {

          roleJa: '代表取締役 CEO',

        }
      ],

          roleJa: '日本営業部長 / マネージング・ディレクター',
          location: '',
          tz: '',

        }
      ],
      lombok: [
        {
          name: 'YUTA NAGATOSHI',

          phone: '+817084548230',
          phoneDisplay: '+81 70 8454 8230',
          email: '',

        }
      ],
      'japan-office': [],

      'takumi-renovation': [

        }

    };

    // ============ I18N ============
    const I18N = {
      ja: {
        back: 'ダッシュボード', hello: 'こんにちは、',
        eyebrow: 'Team Members',
        title: 'チームメンバー一覧',
        lede: '役員・各事業部のメンバー、連絡先、タイムゾーン。WhatsAppアイコンをクリックで直接メッセージを送れます。',
        emptyTitle: 'メンバーは未登録です',
        emptyBody: 'この事業部のメンバーは順次追加されます。管理者にご連絡ください。',
        wa: 'WhatsApp', tel: '電話', mail: 'メール',
        addHint: '<strong>メンバー追加方法:</strong> <code>team.html</code> の <code>TEAM</code> オブジェクトにメンバー情報を追加し、写真を <code>team/</code> フォルダに配置してください。',
        memberCount: '名'
      },
      en: {
        back: 'Dashboard', hello: 'Hi, ',
        eyebrow: 'Team Members',
        title: 'Our Team',
        lede: 'Leadership and division members, with contact details and time zones. Tap the WhatsApp icon to message directly.',
        emptyTitle: 'No members yet',
        emptyBody: 'Members for this division will be added soon. Contact the admin to be added.',
        wa: 'WhatsApp', tel: 'Call', mail: 'Email',
        addHint: '<strong>How to add a member:</strong> add an entry to the <code>TEAM</code> object in <code>team.html</code> and drop their photo in the <code>team/</code> folder.',
        memberCount: ''
      }
    };
    let currentLang = 'ja';

    // ============ ICONS ============
    const ICON = {
      wa: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.8.9-1 1.1-.2.2-.4.2-.6.1-.7-.4-1.5-.7-2.4-1.6-.7-.6-1.1-1.4-1.3-1.6-.1-.2 0-.3.1-.4.1-.1.2-.3.4-.4.1-.1.2-.2.2-.4.1-.2 0-.3 0-.4 0-.1-.6-1.5-.9-2-.2-.5-.5-.4-.7-.4h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4 0 1.4 1 2.8 1.2 3 .1.2 2 3.1 4.9 4.4.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.6-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.1-.3-.2-.6-.3M12 2C6.5 2 2 6.5 2 12c0 1.9.5 3.7 1.5 5.3L2 22l4.8-1.3c1.5.8 3.3 1.3 5.2 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>`,
      tel: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
      mail: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
      pin: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
      clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    };

    // ============ RENDER ============
    function initials(name) {
      return (name || '').split(/\s+/).filter(Boolean).slice(0, 2).map(s => s[0]).join('').toUpperCase() || '?';
    }
    function localTime(tz) {
      try {
        return new Intl.DateTimeFormat(currentLang === 'ja' ? 'ja-JP' : 'en-GB', {
          timeZone: tz, hour: '2-digit', minute: '2-digit'
        }).format(new Date());
      } catch { return ''; }
    }

    function memberCard(m) {
      const phoneClean = (m.phone || '').replace(/[^\d+]/g, '').replace(/^\+/, '');
      const wa = phoneClean ? `https://wa.me/${phoneClean}` : '';
      const tel = m.phone ? `tel:${m.phone}` : '';
      const mail = m.email ? `mailto:${m.email}` : '';
      const lang = I18N[currentLang];
      return `
        <article class="member-card">
          <div class="avatar-wrap">
            <div class="avatar">
              ${m.photo ? `<img src="${m.photo}" alt="${m.name}" onerror="this.remove()" />` : ''}
              <span style="position:absolute">${initials(m.name)}</span>
            </div>
          </div>
          <h3 class="member-name">${m.name}</h3>
          ${m.nameJa ? `<div class="member-name-ja">${m.nameJa}</div>` : ''}
          <div class="member-role">${currentLang === 'ja' ? (m.roleJa || m.role || '') : (m.role || m.roleJa || '')}</div>

          <div class="member-meta">
            ${m.location ? `<div class="member-meta-row">${ICON.pin}<span>${m.location}</span></div>` : ''}
            ${m.tz ? `<div class="member-meta-row">${ICON.clock}<span class="tz-pill">${m.tzLabel || m.tz}</span><span>${localTime(m.tz)}</span></div>` : ''}
            ${m.phoneDisplay || m.phone ? `<div class="member-meta-row">${ICON.tel}<a href="${tel}">${m.phoneDisplay || m.phone}</a></div>` : ''}
            ${m.email ? `<div class="member-meta-row">${ICON.mail}<a href="${mail}">${m.email}</a></div>` : ''}
          </div>

          <div class="actions">
            ${wa ? `<a class="action wa" href="${wa}" target="_blank" rel="noopener" aria-label="WhatsApp">${ICON.wa}<span>${lang.wa}</span></a>` : ''}
            ${tel ? `<a class="action tel" href="${tel}" aria-label="Call">${ICON.tel}<span>${lang.tel}</span></a>` : ''}
            ${mail ? `<a class="action mail" href="${mail}" aria-label="Email">${ICON.mail}<span>${lang.mail}</span></a>` : ''}
          </div>
        </article>`;
    }

    function renderTabs() {
      const dict = I18N[currentLang];
      const tabsEl = document.getElementById('subtabs');
      const panelsEl = document.getElementById('panels');
      tabsEl.innerHTML = SECTIONS.map((s, i) => {
        const count = (TEAM[s.id] || []).length;
        const label = currentLang === 'ja' ? s.ja : s.en;
        return `<button class="subtab ${i === 0 ? 'active' : ''}" data-tab="${s.id}">
          ${label}<span class="count">${count}</span>
        </button>`;
      }).join('');

      panelsEl.innerHTML = SECTIONS.map((s, i) => {
        const list = TEAM[s.id] || [];
        const label = currentLang === 'ja' ? s.ja : s.en;
        const cards = list.length
          ? `<div class="grid">${list.map(memberCard).join('')}</div>`
          : `<div class="empty">
              <div class="empty-title">${dict.emptyTitle}</div>
              <p>${dict.emptyBody}</p>
            </div>`;
        return `
          <section class="panel ${i === 0 ? 'active' : ''}" data-panel="${s.id}">
            <div class="section-head">
              <h2>${label}</h2>
              <div class="sub">${list.length}${dict.memberCount}</div>
            </div>
            ${cards}
            <div class="add-hint" data-i18n-html="addHint">${dict.addHint}</div>
          </section>`;
      }).join('');

      document.querySelectorAll('.subtab').forEach(b => {
        b.addEventListener('click', () => {
          const tab = b.dataset.tab;
          document.querySelectorAll('.subtab').forEach(x => x.classList.toggle('active', x === b));
          document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.panel === tab));
          history.replaceState(null, '', '#' + tab);
        });
      });
      if (location.hash) {
        const t = location.hash.replace('#', '');
        const btn = document.querySelector(`.subtab[data-tab="${t}"]`);
        if (btn) btn.click();
      }
    }

    function setLang(lang) {
      currentLang = lang;
      const dict = I18N[lang];
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (dict[k]) el.textContent = dict[k];
      });
      document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      positionPill();
      renderTabs();
    }
    function positionPill() {
      const pill = document.getElementById('langPill');
      const active = document.querySelector('.lang-toggle button.active');
      if (!active || !pill) return;
      const r = active.getBoundingClientRect();
      const pr = active.parentElement.getBoundingClientRect();
      pill.style.width = r.width + 'px';
      pill.style.transform = `translateX(${r.left - pr.left - 4}px)`;
    }
    document.querySelectorAll('.lang-toggle button').forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));

    // ============ AUTH GATE ============
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      let firstName = (user.displayName || '').trim().split(/\s+/)[0];
      try {
        const snap = await getDoc(doc(db, 'agents', user.uid));
        if (snap.exists() && snap.data().firstName) firstName = snap.data().firstName;
      } catch (e) {}
      if (!firstName && user.email) {
        const local = user.email.split('@')[0].split(/[._-]/)[0];
        firstName = local.charAt(0).toUpperCase() + local.slice(1);
      }
      document.getElementById('userName').textContent = firstName || 'Agent';
    });

    window.addEventListener('load', () => { setLang('ja'); });
    window.addEventListener('resize', positionPill);
    setInterval(() => {
      // Refresh "current local time" pills every minute
      document.querySelectorAll('.tz-pill').forEach(el => {
        // tz pill itself doesn't change; the time text next to it does
      });
      const allTimeNodes = document.querySelectorAll('.member-meta-row .tz-pill');
      // Re-render to update times — cheap
      renderTabs();
    }, 60000);
  </script>
</body>
</html>
