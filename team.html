<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Members — Exceed Real Estate</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="liquid.css">
  <style>
    :root {
      --navy-0: #051428;
      --navy-1: #0a1f3d;
      --navy-2: #102a4f;
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(255,255,255,0.18);
      --text: #f5f7fb;
      --muted: #9aa8c2;
      --gold: #d4b87a;
      --gold-soft: rgba(212,184,122,0.45);
      --cream: #f1ead8;
      --wa: #25d366;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { background: var(--navy-0); }
    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background:
        radial-gradient(1100px 700px at 50% -10%, rgba(212,184,122,0.10), transparent 60%),
        radial-gradient(900px 700px at -10% 110%, rgba(23,54,99,0.7), transparent 60%),
        var(--navy-0);
      color: var(--text);
      min-height: 100vh;
    }

    /* topbar */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--line); backdrop-filter: blur(8px); background: rgba(5,20,40,0.7); position: sticky; top: 0; z-index: 10; }
    .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .brand img { width: 40px; height: 40px; border-radius: 8px; }
    .brand-name { font-family: 'Playfair Display', serif; letter-spacing: 2px; font-weight: 600; }
    .brand-name span { color: var(--gold); font-weight: 400; }
    .topbar-right { display: flex; align-items: center; gap: 14px; color: var(--muted); font-size: 13px; }
    .topbar-right strong { color: var(--cream); font-weight: 600; }
    .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; transition: background .2s, border-color .2s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
    .icon-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--line-strong); }
    .icon-btn svg { width: 14px; height: 14px; }
    .lang-toggle { display: inline-flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid var(--line); border-radius: 999px; padding: 4px; position: relative; }
    .lang-toggle button { background: transparent; border: none; color: var(--muted); font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 1px; padding: 6px 12px; border-radius: 999px; cursor: pointer; transition: color .25s; position: relative; z-index: 1; }
    .lang-toggle button.active { color: var(--navy-0); }
    .lang-toggle .pill { position: absolute; top: 4px; bottom: 4px; background: var(--cream); border-radius: 999px; transition: transform .35s cubic-bezier(.34,1.56,.64,1), width .35s ease; z-index: 0; }

    /* page head */
    .page-head { max-width: 1400px; margin: 0 auto; padding: 36px 32px 0; text-align: center; }
    .page-head .eyebrow { color: var(--gold); letter-spacing: 5px; font-size: 11px; text-transform: uppercase; margin-bottom: 10px; }
    .page-head h1 { font-family: 'Noto Serif JP', 'Playfair Display', serif; font-weight: 500; font-size: clamp(28px, 4vw, 40px); margin: 0 0 8px; }
    .page-head .lede { color: var(--muted); font-size: 14px; max-width: 720px; margin: 0 auto; line-height: 1.6; }

    /* ========================= ORG CHART ========================= */
    .chart-scroll {
      max-width: 100%;
      overflow-x: auto;
      overflow-y: visible;
      padding: 50px 32px 60px;
      scrollbar-width: thin;
    }
    .chart-scroll::-webkit-scrollbar { height: 6px; }
    .chart-scroll::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 6px; }

    .tree, .tree ul { list-style: none; padding: 0; margin: 0; }
    .tree { text-align: center; }
    .tree ul {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 36px;
      position: relative;
    }
    .tree li {
      position: relative;
      padding: 36px 12px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    /* Horizontal line connecting siblings (top edge of each li) */
    .tree li::before, .tree li::after {
      content: '';
      position: absolute;
      top: 0;
      height: 36px;
      border-top: 1px solid var(--gold-soft);
      width: 50%;
    }
    .tree li::before { right: 50%; }
    .tree li::after { left: 50%; }
    /* Hide outer hooks for first/last child so the line doesn't overshoot */
    .tree li:first-child::before, .tree li:last-child::after { border: 0; }
    /* Hide both for only-child */
    .tree li:only-child::before, .tree li:only-child::after { display: none; }
    /* Vertical drop from parent center to child */
    .tree li::before, .tree li::after { /* keep horizontal */ }
    .tree li > .node-wrap::before {
      content: '';
      position: absolute;
      top: -36px; left: 50%;
      width: 1px; height: 36px;
      background: var(--gold-soft);
      transform: translateX(-0.5px);
    }
    /* Root: no upward line */
    .tree > li > .node-wrap::before { display: none; }
    /* For only-child, restore the vertical drop from parent */
    .tree li:only-child > .node-wrap::before { display: block; }

    /* node-wrap holds the card + (optional) member stack below */
    .node-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
    }

    /* ========================= NODE CARDS ========================= */
    .node {
      background: linear-gradient(180deg, rgba(16,42,79,0.92), rgba(10,31,61,0.92));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 14px 12px;
      width: 200px;
      text-align: center;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      backdrop-filter: blur(6px);
      position: relative;
    }
    .node:hover { transform: translateY(-2px); border-color: var(--gold-soft); box-shadow: 0 14px 30px -14px rgba(0,0,0,.6); }

    .node.tier-ceo { width: 240px; padding: 18px 18px 16px; border-color: rgba(212,184,122,0.5); box-shadow: 0 0 0 1px rgba(212,184,122,0.18), 0 18px 40px -16px rgba(0,0,0,.6); }
    .node.tier-ceo::after { content: 'CEO'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--cream), var(--gold)); color: var(--navy-0); font-family: 'Playfair Display', serif; font-size: 10px; font-weight: 700; letter-spacing: 3px; padding: 3px 12px; border-radius: 999px; }

    .node.tier-md { width: 220px; }
    .node.tier-md::after { content: 'MD'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: rgba(212,184,122,0.18); border: 1px solid rgba(212,184,122,0.5); color: var(--gold); font-size: 9px; font-weight: 700; letter-spacing: 2px; padding: 3px 10px; border-radius: 999px; }
    .node.tier-coo::after { content: 'COO'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: rgba(212,184,122,0.18); border: 1px solid rgba(212,184,122,0.5); color: var(--gold); font-size: 9px; font-weight: 700; letter-spacing: 2px; padding: 3px 10px; border-radius: 999px; }

    /* Division header card */
    .node.division {
      width: 180px;
      background: linear-gradient(180deg, rgba(212,184,122,0.10), rgba(212,184,122,0.04));
      border-color: rgba(212,184,122,0.35);
    }
    .node.division .div-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(212,184,122,0.3), rgba(212,184,122,0.1));
      border: 1px solid rgba(212,184,122,0.5);
      display: grid; place-items: center;
      margin: 0 auto 8px;
      color: var(--gold);
    }
    .node.division .div-icon svg { width: 18px; height: 18px; }
    .node.division h4 {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--cream);
      margin: 0 0 2px;
      letter-spacing: 0.3px;
    }
    .node.division .div-count {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 3px 9px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--line);
      border-radius: 999px;
      margin-top: 6px;
    }

    /* Person card content (CEO, MD, members) */
    .avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      margin: 0 auto 10px;
      background: linear-gradient(135deg, var(--gold), #8a6a30);
      padding: 2px;
      position: relative;
    }
    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(212,184,122,0.25), rgba(23,54,99,0.7));
      display: grid; place-items: center;
      color: var(--cream);
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 600;
      letter-spacing: 1px;
      position: relative;
    }
    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; inset: 0; }

    .node.tier-ceo .avatar { width: 88px; height: 88px; }
    .node.tier-ceo .avatar-inner { font-size: 28px; }
    .node.tier-md .avatar { width: 76px; height: 76px; }

    .node h3 {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--cream);
      margin: 0;
      letter-spacing: 0.2px;
      line-height: 1.25;
    }
    .node .name-ja {
      font-family: 'Noto Serif JP', serif;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .node .role {
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 6px;
      line-height: 1.4;
    }

    .actions { display: flex; gap: 5px; margin-top: 10px; justify-content: center; }
    .action {
      width: 28px; height: 28px;
      display: grid; place-items: center;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      transition: all .15s;
      text-decoration: none;
    }
    .action:hover { transform: translateY(-1px); }
    .action svg { width: 13px; height: 13px; }
    .action.wa { background: rgba(37,211,102,0.12); border-color: rgba(37,211,102,0.4); color: #5ee896; }
    .action.wa:hover { background: var(--wa); color: #fff; border-color: var(--wa); }
    .action.tel { background: rgba(122,167,255,0.10); border-color: rgba(122,167,255,0.35); color: #a8c8ff; }
    .action.tel:hover { background: rgba(122,167,255,0.3); color: #fff; }
    .action.mail { background: rgba(212,184,122,0.10); border-color: rgba(212,184,122,0.35); color: var(--gold); }
    .action.mail:hover { background: var(--gold); color: var(--navy-0); }

    /* Member stack under each division — vertical list with vertical line on left of each */
    .member-stack {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
    }
    .member-stack::before {
      content: '';
      position: absolute;
      top: -24px; left: 50%;
      width: 1px; height: 24px;
      background: var(--gold-soft);
      transform: translateX(-0.5px);
    }
    .member-stack .member-node {
      position: relative;
    }
    /* connector between stacked members */
    .member-stack .member-node + .member-node::before {
      content: '';
      position: absolute;
      top: -18px; left: 50%;
      width: 1px; height: 18px;
      background: var(--gold-soft);
      transform: translateX(-0.5px);
    }

    /* Compact member node within division */
    .member-node .node {
      width: 180px;
      padding: 12px 12px 10px;
    }
    .member-node .avatar { width: 52px; height: 52px; }
    .member-node .avatar-inner { font-size: 18px; }
    .member-node .node h3 { font-size: 13px; }
    .member-node .node .name-ja { font-size: 10px; }
    .member-node .node .role { font-size: 9px; }

    .empty-pill {
      font-size: 10px;
      color: var(--muted);
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed var(--line);
      border-radius: 999px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 12px;
    }

    /* Aside sections (Board / Partners) — full-width below tree */
    .aside {
      max-width: 1400px;
      margin: 40px auto 0;
      padding: 0 32px;
    }
    .aside-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .aside-head h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 600;
      margin: 0;
      color: var(--cream);
      letter-spacing: 0.5px;
    }
    .aside-head h2 svg { width: 20px; height: 20px; vertical-align: -3px; margin-right: 8px; color: var(--gold); }
    .aside-head .count { color: var(--muted); font-size: 12px; letter-spacing: 1px; }
    .aside-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .aside-grid .empty-pill { grid-column: 1 / -1; text-align: center; padding: 22px; }

    /* Add hint at bottom */
    .add-hint {
      max-width: 1400px;
      margin: 50px auto 60px;
      padding: 16px 22px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed var(--line-strong);
      border-radius: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    .add-hint strong { color: var(--cream); }
    .add-hint code { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; font-family: ui-monospace, 'SF Mono', monospace; font-size: 11px; color: var(--cream); }

    @media (max-width: 700px) {
      .topbar { padding: 14px 18px; flex-wrap: wrap; gap: 12px; }
      .page-head { padding-left: 18px; padding-right: 18px; }
      .chart-scroll { padding: 40px 18px; }
      .aside { padding-left: 18px; padding-right: 18px; }
      .node { width: 160px; }
      .node.tier-ceo { width: 200px; }
      .node.tier-md { width: 180px; }
      .node.division { width: 150px; }
      .member-node .node { width: 160px; }
    }
  </style>
</head>

    <div class="topbar-right">
      <a class="icon-btn" href="agent.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>

      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6"/><path d="M23 11h-6"/></svg><span data-i18n="partnersTitle">デベロッパーパートナー</span></h2>
      <div class="count" id="partnersCount">0</div>
    </div>
    <div class="aside-grid" id="partnersGrid"></div>
  </section>

    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    };

    // Divisions split between MD (Japan / Projects) and COO (Dubai / Operations)
    const DIVISIONS_BY_PARENT = {
      md: [
        { id: 'japan-sales',       ja: '日本営業',             en: 'Japan Sales',       icon: 'pin' },

    // ============ I18N ============
    const I18N = {
      ja: {
        back: 'ダッシュボード', hello: 'こんにちは、',
        eyebrow: 'Organisation Chart',
        title: '組織図',

        cooEmpty: 'COO 募集中',
        boardTitle: '取締役会',
        partnersTitle: 'デベロッパーパートナー',
        empty: 'メンバー未登録',
        addHint: '<strong>メンバー追加方法:</strong> <code>team.html</code> の <code>TEAM</code> オブジェクトにエントリを追加し、写真を <code>team/&lt;ファイル名&gt;.png</code> に配置してください。'
      },
      en: {
        back: 'Dashboard', hello: 'Hi, ',
        eyebrow: 'Organisation Chart',
        title: 'Our Team',
        lede: 'The full Exceed Group, top-down. CEO at the head, divisions branching below. Tap any WhatsApp icon to message directly.',
        cooEmpty: 'COO — open',
        boardTitle: 'Board of Directors',
        partnersTitle: 'Developer Partners',
        empty: 'No members yet',
        addHint: '<strong>How to add a member:</strong> append an entry to the <code>TEAM</code> object in <code>team.html</code> and drop the photo at <code>team/&lt;filename&gt;.png</code>.'
      }
    };
    let currentLang = 'ja';

    // ============ ICONS ============
    const ICON = {
      wa: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.8.9-1 1.1-.2.2-.4.2-.6.1-.7-.4-1.5-.7-2.4-1.6-.7-.6-1.1-1.4-1.3-1.6-.1-.2 0-.3.1-.4.1-.1.2-.3.4-.4.1-.1.2-.2.2-.4.1-.2 0-.3 0-.4 0-.1-.6-1.5-.9-2-.2-.5-.5-.4-.7-.4h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4 0 1.4 1 2.8 1.2 3 .1.2 2 3.1 4.9 4.4.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.6-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.1-.3-.2-.6-.3M12 2C6.5 2 2 6.5 2 12c0 1.9.5 3.7 1.5 5.3L2 22l4.8-1.3c1.5.8 3.3 1.3 5.2 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>`,
      tel: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
      mail: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
      pin: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
      island: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h20"/><path d="M12 18V8"/><path d="M8 8c0-2 2-4 4-4s4 2 4 4"/><path d="M5 18c-1-2 0-4 2-4"/><path d="M19 18c1-2 0-4-2-4"/></svg>`,
      building: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="1"/><line x1="9" y1="6" x2="9" y2="6"/><line x1="15" y1="6" x2="15" y2="6"/><line x1="9" y1="10" x2="9" y2="10"/><line x1="15" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="9" y2="14"/><line x1="15" y1="14" x2="15" y2="14"/><path d="M10 22v-4h4v4"/></svg>`,
      megaphone: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-7v16L3 13z"/><path d="M11 13v6"/></svg>`,
      leaf: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 4 13c0-7 8-11 17-11-2 11-6 18-10 18z"/><path d="M2 22c5-7 8-11 12-12"/></svg>`,
      tools: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94z"/></svg>`,
      vacant: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
    };

    // ============ HELPERS ============
    function initials(name) {
      return (name || '').split(/\s+/).filter(Boolean).slice(0, 2).map(s => s[0]).join('').toUpperCase() || '?';
    }
    function actionBtns(m) {
      const phoneClean = (m.phone || '').replace(/[^\d+]/g, '').replace(/^\+/, '');
      const wa = phoneClean ? `https://wa.me/${phoneClean}` : '';
      const tel = m.phone ? `tel:${m.phone}` : '';
      const mail = m.email ? `mailto:${m.email}` : '';
      let html = '<div class="actions">';
      if (wa)   html += `<a class="action wa" href="${wa}" target="_blank" rel="noopener" title="WhatsApp" onclick="event.stopPropagation()">${ICON.wa}</a>`;
      if (tel)  html += `<a class="action tel" href="${tel}" title="Call" onclick="event.stopPropagation()">${ICON.tel}</a>`;
      if (mail) html += `<a class="action mail" href="${mail}" title="Email" onclick="event.stopPropagation()">${ICON.mail}</a>`;
      html += '</div>';
      return html;
    }
    function personCard(m, tierClass = '') {
      const role = currentLang === 'ja' ? (m.roleJa || m.role) : (m.role || m.roleJa);
      return `
        <div class="node ${tierClass}">
          <div class="avatar">
            <div class="avatar-inner">
              <span style="position:relative;z-index:0">${initials(m.name)}</span>
              ${m.photo ? `<img src="${m.photo}" alt="${m.name}" onerror="this.remove()" />` : ''}
            </div>
          </div>
          <h3>${m.name}</h3>
          ${m.nameJa ? `<div class="name-ja">${m.nameJa}</div>` : ''}
          ${role ? `<div class="role">${role}</div>` : ''}
          ${actionBtns(m)}
        </div>`;
    }
    function vacantCard(label, tierClass) {
      return `
        <div class="node ${tierClass}" style="opacity:.55; border-style: dashed;">
          <div class="avatar"><div class="avatar-inner">${ICON.vacant}</div></div>
          <h3 style="color: var(--muted)">${label}</h3>
        </div>`;
    }
    function divisionHeader(d) {
      const label = currentLang === 'ja' ? d.ja : d.en;
      const list = TEAM[d.id] || [];
      return `
        <div class="node division">
          <div class="div-icon">${ICON[d.icon] || ICON.pin}</div>
          <h4>${label}</h4>
          <div class="div-count">${list.length}</div>
        </div>`;
    }

    // ============ RENDER ORG CHART ============
    function buildDivisionsHtml(parentKey) {
      const dict = I18N[currentLang];
      return (DIVISIONS_BY_PARENT[parentKey] || []).map(d => {
        const list = TEAM[d.id] || [];
        const stack = list.length
          ? `<div class="member-stack">${list.map(m => `<div class="member-node">${personCard(m)}</div>`).join('')}</div>`
          : `<div class="empty-pill">${dict.empty}</div>`;
        return `
          <li>
            <div class="node-wrap">
              ${divisionHeader(d)}
              ${stack}
            </div>
          </li>`;
      }).join('');
    }

    function renderChart() {
      const dict = I18N[currentLang];
      const ceo = TEAM.ceo[0];
      const md  = TEAM.md[0];
      const coo = TEAM.coo[0];

      const ceoCard = ceo ? personCard(ceo, 'tier-ceo') : vacantCard('CEO', 'tier-ceo');
      const mdCard  = md  ? personCard(md, 'tier-md')   : vacantCard('MD — open', 'tier-md');
      const cooCard = coo ? personCard(coo, 'tier-coo') : vacantCard(dict.cooEmpty, 'tier-coo');

      const html = `
        <ul class="tree">
          <li>
            <div class="node-wrap">
              ${ceoCard}
              <ul>
                <li>
                  <div class="node-wrap">
                    ${mdCard}
                    <ul>
                      ${buildDivisionsHtml('md')}
                    </ul>
                  </div>
                </li>
                <li>
                  <div class="node-wrap">
                    ${cooCard}
                    <ul>
                      ${buildDivisionsHtml('coo')}
                    </ul>
                  </div>
                </li>
              </ul>
            </div>
          </li>
        </ul>`;
      document.getElementById('orgChart').innerHTML = html;
    }

    function renderAside() {
      const dict = I18N[currentLang];
      ['board','partners'].forEach(key => {
        const list = TEAM[key] || [];
        const grid = document.getElementById(key + 'Grid');
        const count = document.getElementById(key + 'Count');
        count.textContent = list.length;
        grid.innerHTML = list.length
          ? list.map(m => personCard(m)).join('')
          : `<div class="empty-pill">${dict.empty}</div>`;
      });
    }

    // ============ I18N + LANG TOGGLE ============
    function setLang(lang) {
      currentLang = lang;
      const dict = I18N[lang];
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (dict[k]) el.textContent = dict[k];
      });
      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const k = el.getAttribute('data-i18n-html');
        if (dict[k]) el.innerHTML = dict[k];
      });
      document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      positionPill();
      renderChart();
      renderAside();
    }
    function positionPill() {
      const pill = document.getElementById('langPill');
      const active = document.querySelector('.lang-toggle button.active');
      if (!active || !pill) return;
      const r = active.getBoundingClientRect();
      const pr = active.parentElement.getBoundingClientRect();
      pill.style.width = r.width + 'px';
      pill.style.transform = `translateX(${r.left - pr.left - 4}px)`;
    }
    document.querySelectorAll('.lang-toggle button').forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));

    // ============ AUTH GATE ============
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      let firstName = (user.displayName || '').trim().split(/\s+/)[0];
      try {
        const snap = await getDoc(doc(db, 'agents', user.uid));
        if (snap.exists() && snap.data().firstName) firstName = snap.data().firstName;
      } catch (e) {}
      if (!firstName && user.email) {
        const local = user.email.split('@')[0].split(/[._-]/)[0];
        firstName = local.charAt(0).toUpperCase() + local.slice(1);
      }
      document.getElementById('userName').textContent = firstName || 'Agent';
    });

    window.addEventListener('load', () => { setLang('ja'); });
    window.addEventListener('resize', positionPill);
  </script>
</body>
</html>
