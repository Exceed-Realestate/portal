<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registered Customers — Exceed Portal</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="liquid.css">
  <style>
    :root {
      --navy-0: #051428;
      --navy-1: #0a1f3d;
      --navy-2: #102a4f;
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(255,255,255,0.18);
      --text: #f5f7fb;
      --muted: #9aa8c2;
      --gold: #d4b87a;
      --cream: #f1ead8;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background:
        radial-gradient(900px 600px at 80% -10%, rgba(212,184,122,0.08), transparent 60%),
        radial-gradient(800px 600px at -10% 110%, rgba(23,54,99,0.6), transparent 60%),
        var(--navy-0);
      color: var(--text);
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--line);
      background: rgba(5,20,40,0.7);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { width: 40px; height: 40px; border-radius: 8px; }
    .brand-name {
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      font-weight: 600;
    }
    .brand-name span { color: var(--gold); font-weight: 400; }
    .topbar-actions { display: flex; gap: 10px; }
    .btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background .2s ease, border-color .2s ease;
    }
    .btn:hover { background: rgba(255,255,255,0.1); border-color: var(--line-strong); }
    .btn svg { width: 14px; height: 14px; }

    .container { max-width: 1280px; margin: 0 auto; padding: 40px 32px; }
    .page-head {
      display: flex; align-items: end; justify-content: space-between;
      margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
    }
    .page-head h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(24px, 3vw, 32px);
      margin: 0;
    }
    .page-head .count {
      color: var(--muted); font-size: 13px; margin-top: 6px;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .page-head .count strong { color: var(--cream); font-weight: 600; }
    .search {
      background: rgba(5,20,40,0.7);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      width: 280px; max-width: 100%;
      outline: none;
      transition: border-color .2s ease;
    }
    .search:focus { border-color: var(--gold); }
    .search::placeholder { color: #5d6c87; }

    .table-wrap {
      background: linear-gradient(180deg, rgba(16,42,79,0.85), rgba(10,31,61,0.85));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 720px; }
    thead { background: rgba(5,20,40,0.5); }
    th {
      text-align: left;
      padding: 14px 18px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--line);
    }
    td {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    .name { font-weight: 600; color: var(--cream); }
    .reg-num {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 1.5px;
      font-weight: 700;
      cursor: pointer;
    }
    .reg-num:hover { color: #fff; }
    .email, .phone { font-family: ui-monospace, 'SF Mono', monospace; font-size: 12px; color: var(--muted); }
    .empty, .loading {
      text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px;
    }
    .denied {
      max-width: 480px; margin: 100px auto;
      text-align: center; padding: 40px 32px;
      background: linear-gradient(180deg, rgba(16,42,79,0.85), rgba(10,31,61,0.85));
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .denied h2 { font-family: 'Playfair Display', serif; margin: 0 0 12px; color: var(--cream); }
    .denied p { color: var(--muted); margin: 0 0 22px; font-size: 14px; }

    .toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: rgba(16,42,79,0.95);
      border: 1px solid rgba(212,184,122,0.4);
      color: var(--text);
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 14px;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      backdrop-filter: blur(10px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 720px) {
      .container { padding: 24px 16px; }
      .page-head { gap: 12px; }
      .page-head h1 { font-size: 22px; }
      .search { width: 100%; }
      th, td { padding: 12px 12px; font-size: 13px; }
      .hide-sm { display: none; }
    }
    @media (max-width: 480px) {
      .topbar { padding: 12px 14px; flex-wrap: wrap; gap: 10px; }
      .brand img { width: 32px; height: 32px; }
      .brand-name { font-size: 13px; letter-spacing: 1.5px; }
      .topbar-actions { flex-wrap: wrap; gap: 6px; }
      .btn { padding: 7px 10px; font-size: 11px; }
      .container { padding: 18px 12px; }
      th, td { padding: 10px 10px; font-size: 12px; }
      table { min-width: 560px; }
    }
  </style>
  <script src="theme-init.js"></script>
</head>
<body class="dashboard-bg">
  <div class="bg-skyline"></div>
  <div class="bg-overlay"></div>

  <header class="topbar">
    <div class="brand">
      <img src="logo.jpg" alt="Exceed" />
      <div class="brand-name">EXCEED <span>REAL ESTATE</span></div>
    </div>
    <div class="topbar-actions">
      <a class="btn" href="agent.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        ダッシュボード
      </a>
      <button class="btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        ログアウト
      </button>
    </div>
  </header>

  <div id="content"></div>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { auth, db, isAdmin } from './firebase-init.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const content = document.getElementById('content');
    let allCustomers = [];

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 2200);
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function fmtDate(ts) {
      if (!ts) return '—';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function renderDenied() {
      content.innerHTML = `
        <div class="denied">
          <h2>アクセスが許可されていません</h2>
          <p>このページは管理者専用です。</p>
          <a class="btn" href="agent.html">ダッシュボードへ</a>
        </div>`;
    }

    function renderTable(filter = '') {
      const f = filter.trim().toLowerCase();
      const rows = allCustomers.filter(c =>
        !f || `${c.firstName} ${c.lastName} ${c.email} ${c.phone || ''} ${c.regNumber || ''} ${c.company || ''}`.toLowerCase().includes(f)
      );
      const tbody = rows.length ? rows.map(c => `
        <tr>
          <td><span class="reg-num" onclick="copyRegNum('${esc(c.regNumber)}')">${esc(c.regNumber)}</span></td>
          <td><div class="name">${esc(c.firstName)} ${esc(c.lastName)}</div></td>
          <td class="email">${esc(c.email)}</td>
          <td class="phone">${esc(c.phone || '—')}</td>
          <td>${esc(c.company || '—')}</td>
          <td>${fmtDate(c.createdAt)}</td>
          <td class="email">${esc(c.registeredByEmail || '—')}</td>
        </tr>`).join('')
        : `<tr><td colspan="7" class="empty">該当する顧客が見つかりません。</td></tr>`;
      document.getElementById('customerRows').innerHTML = tbody;
      document.getElementById('countShown').textContent = rows.length;
    }

    window.copyRegNum = async function(num) {
      try {
        await navigator.clipboard.writeText(num);
        showToast(num + ' をコピーしました');
      } catch {
        showToast('コピーに失敗しました');
      }
    };

    async function loadCustomers() {
      content.innerHTML = `
        <div class="container">
          <div class="page-head">
            <div>
              <h1>Registered Customers</h1>
              <div class="count"><strong id="countShown">0</strong> / <strong id="countTotal">0</strong> 顧客</div>
            </div>
            <input class="search" id="searchInput" placeholder="番号・名前・メール・会社で検索…" />
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Reg. Number</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Company</th>
                  <th>Registered</th>
                  <th>By Agent</th>
                </tr>
              </thead>
              <tbody id="customerRows">
                <tr><td colspan="7" class="loading">読み込み中…</td></tr>
              </tbody>
            </table>
          </div>
        </div>`;
      try {
        const q = query(collection(db, 'customers'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        allCustomers = snap.docs.map(d => d.data());
        document.getElementById('countTotal').textContent = allCustomers.length;
        renderTable();
        document.getElementById('searchInput').addEventListener('input', e => renderTable(e.target.value));
      } catch (err) {
        document.getElementById('customerRows').innerHTML =
          `<tr><td colspan="7" class="empty">エラー: ${esc(err.message)}</td></tr>`;
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      if (!isAdmin(user.email)) { renderDenied(); return; }
      content.innerHTML = `<div class="container"><div class="loading">読み込み中…</div></div>`;
      loadCustomers();
    });

    window.logout = async function() {
      try { await signOut(auth); } catch (e) {}
      window.location.href = 'index.html';
    };
  </script>
  <script src="glass-fx.js" defer></script>
</body>
</html>
