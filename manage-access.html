<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Access — Exceed Real Estate</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <script src="theme-init.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="liquid.css">
  <style>
    :root {
      --navy-0:#051428; --navy-1:#0a1f3d; --navy-2:#102a4f;
      --line:rgba(255,255,255,0.10); --line-strong:rgba(255,255,255,0.18);
      --text:#f5f7fb; --muted:#9aa8c2; --gold:#d4b87a; --cream:#f1ead8; --green:#5cc98f;
      --radius:14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { background: var(--navy-0); }
    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background:
        radial-gradient(1100px 600px at 80% -10%, rgba(212,184,122,0.10), transparent 60%),
        radial-gradient(900px 700px at -10% 110%, rgba(23,54,99,0.6), transparent 60%),
        var(--navy-0);
      color: var(--text); min-height: 100vh;
    }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px); background: rgba(5,20,40,0.7);
      position: sticky; top: 0; z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; color: inherit; }
    .brand img { width: 40px; height: 40px; border-radius: 8px; }
    .brand-name { font-family: 'Playfair Display', serif; letter-spacing: 2px; font-weight: 600; }
    .brand-name span { color: var(--gold); font-weight: 400; }
    .topbar-right { display: flex; align-items: center; gap: 14px; color: var(--muted); font-size: 13px; }
    .topbar-right strong { color: var(--cream); font-weight: 600; }
    .icon-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--line);
      color: var(--text); padding: 8px 14px; border-radius: 8px;
      font-family: inherit; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
      transition: background .2s; display: inline-flex; align-items: center; gap: 8px;
      text-decoration: none; cursor: pointer;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--line-strong); }
    .icon-btn svg { width: 14px; height: 14px; }
    .lang-toggle { display: inline-flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid var(--line); border-radius: 999px; padding: 4px; position: relative; }
    .lang-toggle button { background: transparent; border: none; color: var(--muted); font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 1px; padding: 6px 12px; border-radius: 999px; cursor: pointer; transition: color .25s; position: relative; z-index: 1; }
    .lang-toggle button.active { color: var(--navy-0); }
    .lang-toggle .pill { position: absolute; top: 4px; bottom: 4px; background: var(--cream); border-radius: 999px; transition: transform .35s cubic-bezier(.34,1.56,.64,1), width .35s ease; z-index: 0; }

    .page-head { max-width: 1280px; margin: 0 auto; padding: 36px 32px 0; }
    .page-head .eyebrow { color: var(--gold); letter-spacing: 5px; font-size: 11px; text-transform: uppercase; margin-bottom: 10px; }
    .page-head h1 { font-family: 'Playfair Display', 'Noto Serif JP', serif; font-weight: 600; font-size: clamp(30px, 4.5vw, 44px); margin: 0 0 8px; }
    .page-head .lede { color: var(--muted); font-size: 14px; max-width: 720px; margin: 0; line-height: 1.6; }

    main { max-width: 1280px; margin: 0 auto; padding: 30px 32px 80px; }
    section.card {
      background: linear-gradient(180deg, rgba(16,42,79,0.78), rgba(10,31,61,0.78));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 28px;
      backdrop-filter: blur(18px) saturate(160%);
    }
    section.card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 600;
      margin: 0 0 6px; color: var(--cream);
    }
    section.card .sub { color: var(--muted); font-size: 13px; margin: 0 0 22px; }

    /* ---- Capability matrix ---- */
    .matrix-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
    table.matrix { width: 100%; border-collapse: collapse; min-width: 720px; }
    table.matrix th, table.matrix td {
      padding: 11px 14px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      font-size: 12.5px;
    }
    table.matrix th:last-child, table.matrix td:last-child { border-right: none; }
    table.matrix tr:last-child td { border-bottom: none; }
    table.matrix thead th {
      background: rgba(5,15,30,0.6);
      color: var(--gold);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      position: sticky; top: 0;
      vertical-align: bottom;
      padding: 14px 10px;
    }
    table.matrix thead th .role-tier {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 9px; color: var(--muted); font-weight: 600;
      letter-spacing: 1px; margin-top: 3px;
    }
    table.matrix tbody th {
      background: rgba(5,15,30,0.45);
      text-align: left;
      color: var(--cream);
      font-weight: 600;
      font-size: 12.5px;
      padding-left: 18px;
      width: 240px;
      max-width: 240px;
    }
    table.matrix tbody th .cap-key {
      display: block;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
      letter-spacing: 0.3px;
    }
    .check { color: var(--green); font-size: 16px; font-weight: 700; }
    .nocheck { color: rgba(154,168,194,0.30); font-size: 16px; }
    .role-col-admin    { background: rgba(198,106,106,0.06); }
    .role-col-ceo      { background: rgba(212,184,122,0.06); }
    .role-col-md       { background: rgba(200,152,112,0.06); }
    .role-col-board    { background: rgba(169,180,197,0.06); }
    .role-col-manager  { background: rgba(135,179,157,0.06); }
    .role-col-agent    { background: rgba(227,211,163,0.05); }
    .role-col-back_office { background: rgba(138,153,173,0.06); }

    /* ---- Users table ---- */
    .users-toolbar {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-bottom: 18px; align-items: center;
    }
    .users-toolbar input.search {
      flex: 1; min-width: 240px;
      background: rgba(5,20,40,0.7);
      border: 1px solid var(--line); border-radius: 999px;
      color: var(--text); padding: 10px 16px;
      font-family: inherit; font-size: 13px; outline: none;
    }
    .users-toolbar input.search:focus { border-color: var(--gold); }
    .filter-pill-group { display: inline-flex; background: rgba(255,255,255,0.04); border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
    .filter-pill {
      background: transparent; border: none; color: var(--muted);
      font-family: inherit; font-size: 11px; font-weight: 600;
      padding: 6px 12px; border-radius: 999px; cursor: pointer;
      letter-spacing: 0.5px;
    }
    .filter-pill.active { background: var(--gold); color: var(--navy-0); }
    .users-count { color: var(--muted); font-size: 12px; }
    .users-count strong { color: var(--cream); font-weight: 600; }

    .users-table-wrap { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    table.users { width: 100%; border-collapse: collapse; }
    table.users th, table.users td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    table.users tr:last-child td { border-bottom: none; }
    table.users thead th {
      background: rgba(5,15,30,0.6);
      color: var(--muted);
      font-weight: 700;
      font-size: 10.5px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    table.users tbody tr:hover { background: rgba(212,184,122,0.04); }
    .user-cell { display: flex; align-items: center; gap: 12px; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--cream), var(--gold));
      color: var(--navy-0); font-weight: 700; font-size: 13px;
      display: grid; place-items: center; flex-shrink: 0;
      object-fit: cover;
    }
    .user-name { font-weight: 600; color: var(--cream); }
    .user-email { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
    .role-select {
      background: rgba(5,20,40,0.7);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 7px 12px; border-radius: 6px;
      font-family: inherit; font-size: 12px; cursor: pointer;
      outline: none;
      transition: border-color .15s;
    }
    .role-select:focus { border-color: var(--gold); }
    .role-select.saving { opacity: 0.5; cursor: wait; }
    .role-select.saved { border-color: rgba(92,201,143,0.5); box-shadow: 0 0 0 2px rgba(92,201,143,0.12); }
    .status-pill {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700;
    }
    .status-pill.active    { background: rgba(92,201,143,0.14); color: var(--green); border: 1px solid rgba(92,201,143,0.4); }
    .status-pill.pending   { background: rgba(255,209,102,0.14); color: #ffd166; border: 1px solid rgba(255,209,102,0.4); }
    .status-pill.suspended { background: rgba(255,107,107,0.14); color: #ff8a78; border: 1px solid rgba(255,107,107,0.4); }

    .denied {
      max-width: 560px; margin: 80px auto; text-align: center;
      padding: 40px 28px;
      background: rgba(16,42,79,0.6); border: 1px solid var(--line); border-radius: var(--radius);
    }
    .denied .icon { width: 56px; height: 56px; margin: 0 auto 20px; border-radius: 50%; background: rgba(255,107,107,0.14); border: 1px solid rgba(255,107,107,0.4); display: grid; place-items: center; color: #ff8a78; }
    .denied h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin: 0 0 10px; color: var(--cream); }
    .denied p { color: var(--muted); font-size: 13.5px; line-height: 1.6; margin: 0 0 20px; }

    .loading { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
    .loading::after { content: '…'; animation: dots 1.4s infinite; }
    @keyframes dots { 0%,20% { content: '.'; } 40% { content: '..'; } 60%,100% { content: '...'; } }

    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(5,15,30,0.95); border: 1px solid rgba(212,184,122,0.4);
      padding: 12px 20px; border-radius: 10px; color: var(--cream); font-size: 13px;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1); z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(255,107,107,0.5); color: #ff8a78; }

    @media (max-width: 700px) {
      table.users .hide-sm { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="agent.html">
      <img src="logo.jpg" alt="">
      <div class="brand-name">EXCEED <span>Real Estate</span></div>
    </a>
    <div class="topbar-right">
      <div class="lang-toggle" id="langToggle">
        <span class="pill" id="langPill"></span>
        <button data-lang="ja" class="active">日本語</button>
        <button data-lang="en">EN</button>
      </div>
      <span><span data-i18n="hello">こんにちは、</span><strong id="userName">—</strong></span>
      <a class="icon-btn" href="agent.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span data-i18n="back">ダッシュボード</span>
      </a>
    </div>
  </header>

  <div class="page-head">
    <div class="eyebrow" data-i18n="eyebrow">Admin · Access</div>
    <h1 data-i18n="title">アクセス管理</h1>
    <p class="lede" data-i18n="lede">役割ごとの権限と、各ユーザーのアクセスレベルを一括で管理できます。システム管理者専用。</p>
  </div>

  <main id="content">
    <div class="loading" data-i18n="loading">読み込み中</div>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { auth, db, isAdmin, can, ROLES, ROLE_LABELS, ROLE_CAPABILITIES, CAPABILITIES, roleLabel, roleSummary, roleCapabilities, isValidRole } from './firebase-init.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { collection, getDocs, doc, getDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const I18N = {
      ja: {
        back: 'ダッシュボード', hello: 'こんにちは、',
        eyebrow: 'Admin · Access',
        title: 'アクセス管理',
        lede: '役割ごとの権限と、各ユーザーのアクセスレベルを一括で管理できます。システム管理者専用。',
        loading: '読み込み中',
        deniedTitle: 'アクセスが許可されていません',
        deniedBody: 'このページはシステム管理者専用です。',
        secMatrixTitle: '権限マトリクス',
        secMatrixSub: '各ロールが利用できる機能。コードで管理されており、変更には開発者の対応が必要です（firebase-init.js → CAPABILITIES）。',
        secUsersTitle: 'ユーザーアクセス',
        secUsersSub: '各ユーザーのアクセスレベルを変更します。変更は即時反映されます。',
        searchPh: '名前・メールで検索…',
        filterAll: 'すべて',
        usersCount: '<strong>{shown}</strong> / <strong>{total}</strong> 名',
        colUser: 'ユーザー',
        colEmail: 'メール',
        colCurrentRole: '現在のロール',
        colStatus: 'ステータス',
        colChangeRole: 'ロール変更',
        emptyUsers: 'ユーザーが見つかりません',
        roleSaved: '✓ ロールを更新しました',
        roleSaveFail: '保存に失敗: ',
        capRegisterCustomer: '顧客の登録',
        capViewAllCustomers: '全顧客の閲覧',
        capEditAllCustomers: '全顧客の編集',
        capViewAllAgents:    '全エージェントの閲覧',
        capApproveAgents:    'エージェント承認',
        capChangeRoles:      'ロール変更',
        capEditTeamTree:     '組織図の編集',
        capCreateDealAlert:  'Deal Alert 作成',
        capReceiveDealAlerts:'Deal Alert 通知受信',
        capViewLeadership:   'リーダーシップ画面',
        capViewDatabase:     'Database 閲覧',
        capBookCar:          '社用車予約',
        capUseTravel:        'Travel 機能',
        capUseIRR:           'IRR Simulator',
        capUseListings:      'Listings 閲覧'
      },
      en: {
        back: 'Dashboard', hello: 'Hi, ',
        eyebrow: 'Admin · Access',
        title: 'Manage Access',
        lede: 'See what each role unlocks and change every user\'s access level — admin only.',
        loading: 'Loading',
        deniedTitle: 'Access denied',
        deniedBody: 'This page is for the system admin only.',
        secMatrixTitle: 'Capability matrix',
        secMatrixSub: 'What each role can do. Defined in code (firebase-init.js → CAPABILITIES); a developer is required to change them.',
        secUsersTitle: 'User access',
        secUsersSub: 'Change any user\'s access level. Changes apply immediately.',
        searchPh: 'Search name or email…',
        filterAll: 'All',
        usersCount: '<strong>{shown}</strong> / <strong>{total}</strong> users',
        colUser: 'User',
        colEmail: 'Email',
        colCurrentRole: 'Current role',
        colStatus: 'Status',
        colChangeRole: 'Change role',
        emptyUsers: 'No users found',
        roleSaved: '✓ Role updated',
        roleSaveFail: 'Save failed: ',
        capRegisterCustomer: 'Register customers',
        capViewAllCustomers: 'View all customers',
        capEditAllCustomers: 'Edit all customers',
        capViewAllAgents:    'View all agents',
        capApproveAgents:    'Approve agents',
        capChangeRoles:      'Change roles',
        capEditTeamTree:     'Edit team tree',
        capCreateDealAlert:  'Create Deal Alerts',
        capReceiveDealAlerts:'Receive Deal Alerts',
        capViewLeadership:   'Leadership briefing',
        capViewDatabase:     'View Database',
        capBookCar:          'Book company car',
        capUseTravel:        'Use Travel',
        capUseIRR:           'Use IRR Simulator',
        capUseListings:      'View Listings'
      }
    };
    let currentLang = 'ja';
    function setLang(lang) {
      currentLang = lang;
      const dict = I18N[lang];
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (dict[k]) el.textContent = dict[k]; });
      document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      positionPill();
      if (window._loaded) renderAll();
    }
    function positionPill() {
      const pill = document.getElementById('langPill');
      const active = document.querySelector('.lang-toggle button.active');
      if (!active || !pill) return;
      const r = active.getBoundingClientRect();
      const pr = active.parentElement.getBoundingClientRect();
      pill.style.width = r.width + 'px';
      pill.style.transform = `translateX(${r.left - pr.left - 4}px)`;
    }
    document.querySelectorAll('.lang-toggle button').forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.toggle('error', !!isError);
      t.classList.add('show');
      clearTimeout(t._tm);
      t._tm = setTimeout(() => t.classList.remove('show'), 2400);
    }
    function escHtml(s) {
      return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function initials(s) {
      return (s || '?').split(/\s+/).slice(0,2).map(x => (x[0] || '').toUpperCase()).join('');
    }

    /* ---- Capability matrix renderer ---- */
    const CAP_LABEL_KEYS = {
      registerCustomer:    'capRegisterCustomer',
      viewAllCustomers:    'capViewAllCustomers',
      editAllCustomers:    'capEditAllCustomers',
      viewAllAgents:       'capViewAllAgents',
      approveAgents:       'capApproveAgents',
      changeRoles:         'capChangeRoles',
      editTeamTree:        'capEditTeamTree',
      createDealAlert:     'capCreateDealAlert',
      receiveDealAlerts:   'capReceiveDealAlerts',
      viewLeadership:      'capViewLeadership',
      viewDatabase:        'capViewDatabase',
      bookCar:             'capBookCar',
      useTravel:           'capUseTravel',
      useIRR:              'capUseIRR',
      useListings:         'capUseListings'
    };
    const TIER_LABEL = { admin: 'T0', ceo: 'T1', md: 'T2', board: 'T3', manager: 'T4', agent: 'T5', back_office: 'T6' };

    function renderMatrix() {
      const dict = I18N[currentLang];
      const headers = ROLES.map(r =>
        `<th class="role-col-${r}">${escHtml(roleLabel(r, currentLang))}<span class="role-tier">${TIER_LABEL[r] || ''}</span></th>`
      ).join('');
      const rows = Object.keys(CAPABILITIES).map(cap => {
        const labelKey = CAP_LABEL_KEYS[cap];
        const label = (labelKey && dict[labelKey]) || cap;
        const cells = ROLES.map(r => {
          const has = CAPABILITIES[cap].includes(r);
          return `<td class="role-col-${r}">${has ? '<span class="check">✓</span>' : '<span class="nocheck">·</span>'}</td>`;
        }).join('');
        return `<tr>
          <th>${escHtml(label)}<span class="cap-key">${escHtml(cap)}</span></th>
          ${cells}
        </tr>`;
      }).join('');
      return `
        <section class="card">
          <h2>${dict.secMatrixTitle}</h2>
          <p class="sub">${dict.secMatrixSub}</p>
          <div class="matrix-wrap">
            <table class="matrix">
              <thead><tr><th></th>${headers}</tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </section>`;
    }

    /* ---- Users table ---- */
    let _users = [];
    let _filterRole = 'all';
    let _searchQuery = '';

    async function loadUsers() {
      try {
        const q = query(collection(db, 'agents'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        _users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch (e) {
        console.error('users load failed', e);
        _users = [];
      }
    }

    function userMatches(u) {
      if (_filterRole !== 'all' && (u.role || 'agent') !== _filterRole) return false;
      if (_searchQuery) {
        const q = _searchQuery.toLowerCase();
        const hay = `${u.firstName || ''} ${u.lastName || ''} ${u.email || ''}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    }

    function renderUsers() {
      const dict = I18N[currentLang];
      const filtered = _users.filter(userMatches);
      const filterPills = ['all', ...ROLES].map(r => {
        const label = r === 'all' ? dict.filterAll : roleLabel(r, currentLang);
        return `<button class="filter-pill ${_filterRole === r ? 'active' : ''}" data-filter-role="${r}">${escHtml(label)}</button>`;
      }).join('');

      const rows = filtered.length ? filtered.map(u => {
        const role = isValidRole(u.role) ? u.role : 'agent';
        const status = u.status || 'active';
        const fullName = `${u.firstName || ''} ${u.lastName || ''}`.trim() || u.email || '?';
        const photo = u.photoURL || '';
        const avatarHtml = photo
          ? `<img class="user-avatar" src="${escHtml(photo)}" alt="" onerror="this.outerHTML='&lt;div class=\\'user-avatar\\'&gt;${initials(fullName)}&lt;/div&gt;'">`
          : `<div class="user-avatar">${initials(fullName)}</div>`;
        const options = ROLES.map(r =>
          `<option value="${r}"${r === role ? ' selected' : ''}>${escHtml(roleLabel(r, currentLang))}</option>`
        ).join('');
        return `<tr data-uid="${escHtml(u.id)}">
          <td>
            <div class="user-cell">
              ${avatarHtml}
              <div>
                <div class="user-name">${escHtml(fullName)}</div>
                <div class="user-email">${escHtml(u.email || '—')}</div>
              </div>
            </div>
          </td>
          <td class="hide-sm">${escHtml(roleLabel(role, currentLang))}</td>
          <td><span class="status-pill ${status}">${escHtml(status)}</span></td>
          <td><select class="role-select" data-uid="${escHtml(u.id)}" aria-label="Role">${options}</select></td>
        </tr>`;
      }).join('') : `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:30px;">${dict.emptyUsers}</td></tr>`;

      const countText = (dict.usersCount || '')
        .replace('{shown}', filtered.length).replace('{total}', _users.length);

      return `
        <section class="card">
          <h2>${dict.secUsersTitle}</h2>
          <p class="sub">${dict.secUsersSub}</p>
          <div class="users-toolbar">
            <input type="search" class="search" id="userSearch" placeholder="${escHtml(dict.searchPh)}" value="${escHtml(_searchQuery)}">
            <div class="filter-pill-group">${filterPills}</div>
            <span class="users-count">${countText}</span>
          </div>
          <div class="users-table-wrap">
            <table class="users">
              <thead>
                <tr>
                  <th>${dict.colUser}</th>
                  <th class="hide-sm">${dict.colCurrentRole}</th>
                  <th>${dict.colStatus}</th>
                  <th>${dict.colChangeRole}</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </section>`;
    }

    function renderAll() {
      document.getElementById('content').innerHTML = renderMatrix() + renderUsers();
      // Wire interactions
      const search = document.getElementById('userSearch');
      if (search) {
        search.addEventListener('input', (e) => {
          _searchQuery = e.target.value;
          // Re-render users only — keep matrix in DOM
          rerenderUsersOnly();
        });
      }
      document.querySelectorAll('.filter-pill').forEach(p => {
        p.addEventListener('click', () => {
          _filterRole = p.dataset.filterRole;
          rerenderUsersOnly();
        });
      });
      document.querySelectorAll('.role-select').forEach(sel => {
        sel.addEventListener('change', () => onRoleChange(sel));
      });
    }
    function rerenderUsersOnly() {
      // Replace just the users section so search input doesn't lose focus on every keystroke
      const main = document.getElementById('content');
      const oldUsers = main.querySelector('section.card:nth-child(2)');
      if (!oldUsers) { renderAll(); return; }
      const tmp = document.createElement('div');
      tmp.innerHTML = renderUsers();
      main.replaceChild(tmp.firstElementChild, oldUsers);
      // Re-wire (only the users section, not the matrix)
      const search = document.getElementById('userSearch');
      if (search) {
        search.addEventListener('input', (e) => { _searchQuery = e.target.value; rerenderUsersOnly(); });
        // Restore focus + caret position
        search.focus();
        const v = search.value; search.value = ''; search.value = v;
      }
      document.querySelectorAll('.filter-pill').forEach(p => {
        p.addEventListener('click', () => { _filterRole = p.dataset.filterRole; rerenderUsersOnly(); });
      });
      document.querySelectorAll('.role-select').forEach(sel => {
        sel.addEventListener('change', () => onRoleChange(sel));
      });
    }

    async function onRoleChange(sel) {
      const dict = I18N[currentLang];
      const uid = sel.getAttribute('data-uid');
      const newRole = sel.value;
      if (!isValidRole(newRole)) return;
      sel.classList.add('saving');
      sel.disabled = true;
      try {
        await updateDoc(doc(db, 'agents', uid), { role: newRole });
        const u = _users.find(x => x.id === uid);
        if (u) u.role = newRole;
        sel.classList.remove('saving');
        sel.classList.add('saved');
        showToast(dict.roleSaved);
        setTimeout(() => sel.classList.remove('saved'), 1500);
      } catch (err) {
        console.error(err);
        sel.classList.remove('saving');
        showToast(dict.roleSaveFail + (err.message || err.code || 'unknown'), true);
      } finally {
        sel.disabled = false;
      }
    }

    function renderDenied() {
      const dict = I18N[currentLang];
      document.getElementById('content').innerHTML = `
        <div class="denied">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <h2>${dict.deniedTitle}</h2>
          <p>${dict.deniedBody}</p>
          <a class="icon-btn" href="agent.html"><span>${dict.back}</span></a>
        </div>`;
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      let firstName = (user.displayName || '').trim().split(/\s+/)[0];
      let role = null;
      try {
        const snap = await getDoc(doc(db, 'agents', user.uid));
        if (snap.exists()) {
          const data = snap.data();
          if (data.firstName) firstName = data.firstName;
          role = data.role || null;
        }
      } catch (_) {}
      if (!firstName && user.email) {
        const local = user.email.split('@')[0].split(/[._-]/)[0];
        firstName = local.charAt(0).toUpperCase() + local.slice(1);
      }
      document.getElementById('userName').textContent = firstName || 'Admin';

      // Strict gate — only the system admin (changeRoles capability) can see this page
      if (!can(role, 'changeRoles', user.email)) {
        renderDenied();
        return;
      }

      await loadUsers();
      window._loaded = true;
      renderAll();
    });

    window.addEventListener('load', () => { setLang('ja'); });
    window.addEventListener('resize', positionPill);
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'e') {
        e.preventDefault();
        setLang(currentLang === 'ja' ? 'en' : 'ja');
      }
    });
  </script>
</body>
</html>
