<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registered Agents — Exceed Portal</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-0: #051428;
      --navy-1: #0a1f3d;
      --navy-2: #102a4f;
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(255,255,255,0.18);
      --text: #f5f7fb;
      --muted: #9aa8c2;
      --gold: #d4b87a;
      --cream: #f1ead8;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background:
        radial-gradient(900px 600px at 80% -10%, rgba(212,184,122,0.08), transparent 60%),
        radial-gradient(800px 600px at -10% 110%, rgba(23,54,99,0.6), transparent 60%),
        var(--navy-0);
      color: var(--text);
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--line);
      background: rgba(5,20,40,0.7);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { width: 40px; height: 40px; border-radius: 8px; }
    .brand-name {
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      font-weight: 600;
    }
    .brand-name span { color: var(--gold); font-weight: 400; }
    .topbar-actions { display: flex; gap: 10px; }
    .btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background .2s ease, border-color .2s ease;
    }
    .btn:hover { background: rgba(255,255,255,0.1); border-color: var(--line-strong); }
    .btn svg { width: 14px; height: 14px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 40px 32px; }
    .page-head {
      display: flex; align-items: end; justify-content: space-between;
      margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
    }
    .page-head h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(24px, 3vw, 32px);
      margin: 0;
    }
    .page-head .count {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .page-head .count strong { color: var(--cream); font-weight: 600; }

    .search {
      background: rgba(5,20,40,0.7);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      width: 280px;
      max-width: 100%;
      outline: none;
      transition: border-color .2s ease;
    }
    .search:focus { border-color: var(--gold); }
    .search::placeholder { color: #5d6c87; }

    .table-wrap {
      background: linear-gradient(180deg, rgba(16,42,79,0.85), rgba(10,31,61,0.85));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead {
      background: rgba(5,20,40,0.5);
    }
    th {
      text-align: left;
      padding: 14px 18px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--line);
    }
    td {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    .name { font-weight: 600; color: var(--cream); }
    .email { font-family: ui-monospace, 'SF Mono', monospace; font-size: 12px; color: var(--muted); }
    .status {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .status.active { background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.25); }
    .status.pending { background: rgba(245, 158, 11, 0.12); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.25); }
    .empty, .loading {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
      font-size: 14px;
    }
    .denied {
      max-width: 480px;
      margin: 100px auto;
      text-align: center;
      padding: 40px 32px;
      background: linear-gradient(180deg, rgba(16,42,79,0.85), rgba(10,31,61,0.85));
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .denied h2 {
      font-family: 'Playfair Display', serif;
      margin: 0 0 12px;
      color: var(--cream);
    }
    .denied p { color: var(--muted); margin: 0 0 22px; font-size: 14px; }

    @media (max-width: 720px) {
      .container { padding: 24px 18px; }
      th, td { padding: 12px 12px; font-size: 13px; }
      .hide-sm { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="logo.jpg" alt="Exceed" />
      <div class="brand-name">EXCEED <span>REAL ESTATE</span></div>
    </div>
    <div class="topbar-actions">
      <a class="btn" href="agent.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        ダッシュボード
      </a>
      <button class="btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        ログアウト
      </button>
    </div>
  </header>

  <div id="content"></div>

  <script type="module">
    import { auth, db, isAdmin } from './firebase-init.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const content = document.getElementById('content');

    function renderLoading() {
      content.innerHTML = `<div class="container"><div class="loading">読み込み中…</div></div>`;
    }
    function renderDenied() {
      content.innerHTML = `
        <div class="denied">
          <h2>アクセスが許可されていません</h2>
          <p>このページは管理者専用です。ダッシュボードに戻ってください。</p>
          <a class="btn" href="agent.html">ダッシュボードへ</a>
        </div>`;
    }

    function fmtDate(ts) {
      if (!ts) return '—';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    let allAgents = [];

    function renderTable(filter = '') {
      const f = filter.trim().toLowerCase();
      const rows = allAgents.filter(a =>
        !f || `${a.firstName} ${a.lastName} ${a.email} ${a.phone || ''}`.toLowerCase().includes(f)
      );
      const tbody = rows.length ? rows.map(a => `
        <tr>
          <td><div class="name">${esc(a.firstName)} ${esc(a.lastName)}</div></td>
          <td class="email">${esc(a.email)}</td>
          <td class="hide-sm">${esc(a.phone || '—')}</td>
          <td class="hide-sm">${fmtDate(a.createdAt)}</td>
          <td><span class="status ${a.status === 'pending' ? 'pending' : 'active'}">${a.status || 'active'}</span></td>
        </tr>`).join('')
        : `<tr><td colspan="5" class="empty">該当するエージェントが見つかりません。</td></tr>`;
      document.getElementById('agentRows').innerHTML = tbody;
      document.getElementById('countShown').textContent = rows.length;
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    async function loadAgents() {
      content.innerHTML = `
        <div class="container">
          <div class="page-head">
            <div>
              <h1>Registered Agents</h1>
              <div class="count"><strong id="countShown">0</strong> / <strong id="countTotal">0</strong> エージェント</div>
            </div>
            <input class="search" id="searchInput" placeholder="名前・メール・電話で検索…" />
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th class="hide-sm">Phone</th>
                  <th class="hide-sm">Registered</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="agentRows">
                <tr><td colspan="5" class="loading">読み込み中…</td></tr>
              </tbody>
            </table>
          </div>
        </div>`;
      try {
        const q = query(collection(db, 'agents'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        allAgents = snap.docs.map(d => d.data());
        document.getElementById('countTotal').textContent = allAgents.length;
        renderTable();
        document.getElementById('searchInput').addEventListener('input', e => renderTable(e.target.value));
      } catch (err) {
        document.getElementById('agentRows').innerHTML =
          `<tr><td colspan="5" class="empty">エラー: ${esc(err.message)}</td></tr>`;
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      if (!isAdmin(user.email)) { renderDenied(); return; }
      renderLoading();
      loadAgents();
    });

    window.logout = async function() {
      try { await signOut(auth); } catch (e) {}
      window.location.href = 'index.html';
    };
  </script>
</body>
</html>
